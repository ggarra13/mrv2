name: Vulkan Win64

on:
  push:
    branches-ignore:
      - main
    tags-ignore:
      - "**"
  workflow_dispatch:

jobs:
  ###################################
  #                                 #
  # FULL BUILDS                     #
  #                                 #
  ###################################
  windows-vulkan-full-build:
    runs-on: windows-2022

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1    
      
      - name: Setup Native MSVC AMD64 Environment
        shell: powershell
        run: |
          # Locate vcvarsall.bat dynamically using vswhere
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $vcvarsPath = Join-Path $vsPath "VC\Auxiliary\Build\vcvarsall.bat"
    
          # Run vcvarsall natively for amd64 and export variables to the GitHub environment
          cmd.exe /c " `"$vcvarsPath`" amd64 && set " | Foreach-Object {
          if ($_ -match '^([^=]+)=(.*)$') {
            $name = $Matches[1]
            $value = $Matches[2]
            # Only import paths and compiler-critical flags to avoid polluting the env
            if ($name -match '^(PATH|INCLUDE|LIB|LIBPATH|VCTools.*)$' -and $value) {
                if ($name -eq 'PATH') {
                    # Append paths safely to GITHUB_PATH
                    $value -split ';' | ForEach-Object { 
                        if ($_) { $_ | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append }
                    }
                } else {
                    # Export variables safely to GITHUB_ENV
                    "$name=$value" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                    }
                }
            }
          }
          
      - name: Setup MSYS
        uses: msys2/setup-msys2@v2
        with:
          update: true
          path-type: inherit
          
      - name: Fix linker shadowing
        run: mv /usr/bin/link.exe /usr/bin/link_msys.exe
        
      - name: Verify compilers
        run: |
          which cl
          which clang-cl
          clang-cl --version
          
      # - name: Setup environment
      #   uses: ilammy/msvc-dev-cmd@v1

      - name: Install Visual C++ Redistributable 2022
        run: |
          $vc_redist_url_2022 = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          Invoke-WebRequest -Uri $vc_redist_url_2022 -OutFile vc_redist_2022.x64.exe
          Start-Process vc_redist_2022.x64.exe -ArgumentList "/install", "/quiet", "/norestart" -Wait
        shell: powershell

      # - name: Activate MSVC
      #   uses: ilammy/msvc-dev-cmd@v1
      #   with:
      #     path: 'C:\VS2022Custom'

      - name: Install ccache
        shell: pwsh
        run: |
          # Detect architecture
          if ("${{ runner.arch }}" -eq "ARM64") {
            $arch = "aarch64"
          } else {
            $arch = "x86_64"
          }

          $version = "4.13.6"  
          $url = "https://github.com/ccache/ccache/releases/download/v$version/ccache-$version-windows-$arch.zip"

          Invoke-WebRequest -Uri $url -OutFile ccache.zip
          Expand-Archive -Path ccache.zip -DestinationPath . -Force

          # Move the binary to a location in PATH
          $ccache_bin_dir = "$env:USERPROFILE\.local\bin"
          New-Item -ItemType Directory -Force -Path $ccache_bin_dir | Out-Null
          Move-Item -Path "ccache-$version-windows-$arch/ccache.exe" -Destination "$ccache_bin_dir\ccache.exe" -Force

          # Add to PATH for subsequent steps
          echo "$ccache_bin_dir" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

          # Verify (using absolute path because PATH isn't updated for current step)
          & "$ccache_bin_dir\ccache.exe" --version

      - name: Set ccache Environment Variables
        shell: pwsh
        run: |
          # 1. Use runner.temp for a guaranteed, shared absolute path across Windows/Node/MSYS2
          $ccache_dir = "$env:RUNNER_TEMP\.ccache"
          echo "CCACHE_DIR=$ccache_dir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          
          # 2. Normalize Workspace path for MSYS2 compatibility
          $workspace = "${{ github.workspace }}".Replace('\', '/')
          echo "CCACHE_BASEDIR=$workspace" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          
          echo "CCACHE_COMPILERCHECK=content" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - uses: actions/cache@v5
        with:
          # Match the exact absolute path defined in the previous step
          path: ${{ runner.temp }}/.ccache
          key: ${{ runner.os }}-${{ runner.arch }}-Vulkan-ccache-${{ github.sha }}
          restore-keys: |
              ${{ runner.os }}-${{ runner.arch }}-Vulkan-ccache-
          
      - name: Synchronize clock
        shell: cmd
        run: |
          w32tm /config /manualpeerlist:time.windows.com /syncfromflags:manual /reliable:YES /update
          net stop w32time
          net start w32time
          w32tm /resync /rediscover
          
      - name: Configure and Reset ccache
        # We can now safely use the msys2 shell since paths are absolute and environment is set
        run: |
          ccache --max-size=500M
          ccache -z # Zero out the stats so you can see the cache hit rate for *this* specific run at the end
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy,rustfmt
        
      - name: Install cargo-c if needed
        run: |
          if ! command -v cargo-cinstall >/dev/null 2>&1; then
              cargo install cargo-c --locked
          fi
          
      - name: Verify Rust and Cargo
        run: |
          rustc -Vv
          cargo -Vv
          cargo cinstall --version
          which rustc
          which cargo

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-
    
      - name: Get machine name
        run: |
          echo "Machine name: $RUNNER_NAME"

      # Install Vulkan SDK
      - name: Install Vulkan SDK
        env:
          BUILD_VULKAN: OFF  # optional
        run: |
          . ./etc/windows/install_vulkan.sh

      # Set Vulkan environment variables
      - name: Set Vulkan environment variables
        run: |
          # Debug: show current directory and contents
          echo "Current directory: $(pwd)"
          echo "Directory contents:"
          ls -la

          # Find Vulkan SDK installation in workspace
          VULKAN_DIR=$(find . -maxdepth 1 -type d -name "VulkanSDK-*" 2>/dev/null | head -1)

          if [ -z "$VULKAN_DIR" ]; then
            echo "Error: Vulkan SDK directory not found (VulkanSDK-*)"
            echo "Available directories:"
            ls -ld */ 2>/dev/null || echo "No directories found"
            exit 1
          fi

          if [ -d "$VULKAN_DIR" ]; then
            # Convert to absolute path
            VULKAN_DIR=$(cd "$VULKAN_DIR" && pwd)

            # Convert to Windows path for WINDOWS_VULKAN_SDK
            WINDOWS_PATH=$(cygpath -w "$VULKAN_DIR")

            echo "VULKAN_SDK=$VULKAN_DIR" >> $GITHUB_ENV
            echo "WINDOWS_VULKAN_SDK=$WINDOWS_PATH" >> $GITHUB_ENV
            echo "$VULKAN_DIR/bin" >> $GITHUB_PATH
            echo "VK_LAYER_PATH=$VULKAN_DIR/lib" >> $GITHUB_ENV
            echo "Vulkan SDK configured: $VULKAN_DIR"
            echo "Windows path: $WINDOWS_PATH"
          else
            echo "Error: Vulkan SDK directory exists but is not accessible: $VULKAN_DIR"
            exit 1
          fi

      - name: Install and Copy Vulkan Runtime
        shell: powershell
        run: |
          # 1. Run the Runtime Installer silently (/S)
          # This extracts vulkan-1.dll to C:\Windows\System32
          cd $Env:WINDOWS_VULKAN_SDK

          Write-Host "Installing Vulkan Runtime..."
          Start-Process -FilePath ".\Helpers\VulkanRT.exe" -ArgumentList "/S" -Wait

          # 2. Verify installation
          $systemDll = "C:\Windows\System32\vulkan-1.dll"
          if (Test-Path $systemDll) {
              Write-Host "SUCCESS: vulkan-1.dll found in System32."

              # 3. (Optional) Copy to your local Bin folder if your build expects it there
              Copy-Item -Path $systemDll -Destination ".\Bin\" -Force
              Write-Host "Copied vulkan-1.dll to local Bin folder."
          } else {
              Write-Error "FAILURE: vulkan-1.dll was not found in System32 after running installer."
              exit 1
          }

      # - name: Verify Vulkan
      #   run: ${VULKAN_SDK}/Bin/vulkaninfoSDK.exe

      - name: Setup environment
        run: mkdir -p ssh

      - name: Decode SSH key
        run: echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ssh/id_rsa
        shell: bash

      # - name: Decode FLTK SSH key
      #   run: |
      #       mkdir -p ~/.ssh
      #       echo "${{ secrets.FLTK_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
      #       chmod 600 ~/.ssh/id_ed25519
      #       ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Set permissions on SSH key
        shell: cmd
        run: |
          icacls "ssh\id_rsa" /inheritance:r /grant:r "%USERNAME%:R"

      - name: Add SourceForge to known_hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan frs.sourceforge.net >> ~/.ssh/known_hosts

      - name: Set executable permissions
        run: |
          chmod +x ./*.sh ./bin/*.sh ./etc/*.sh ./bin/release/*.sh

      - name: Install MSYS2 Dependencies
        run: |
          pacman -S --noconfirm rsync coreutils

      - name: Build vmrv2
        env:
          BUILD_PYTHON: ON
          MRV2_PYFLTK: ON
          MRV2_PYBIND11: ON
          MRV2_NETWORK: ON
          MRV2_PDF: ON
          TLRENDER_AV1: ON
          TLRENDER_EXR: ON
          TLRENDER_FFMPEG: ON
          TLRENDER_FFMPEG_MINIMAL: ON
          TLRENDER_GL: OFF
          TLRENDER_HAP: ON
          TLRENDER_JPEG: ON
          TLRENDER_NDI: OFF
          TLRENDER_NET: ON
          TLRENDER_OPENJPH: ON
          TLRENDER_RAW: ON
          TLRENDER_SGI: ON
          TLRENDER_STB: ON
          TLRENDER_SVTAV1: ON
          TLRENDER_TIFF: ON
          TLRENDER_USD: OFF
          TLRENDER_VPX: ON
          TLRENDER_YASM: ON

        run: |
          ./etc/runme_nolog.sh -v -t package -vk clean

      - name: Upload binaries
        run: |
          ./bin/release/upload_sourceforge.sh -vk
